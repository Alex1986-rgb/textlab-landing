<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#1a1530"/><stop offset="1" stop-color="#100c20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="prod" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="prodA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <circle cx="760" cy="150" r="280" fill="#7c5cff" opacity="0.14"/>
  <circle cx="120" cy="1080" r="240" fill="#22d3ee" opacity="0.1"/>

  <!-- brand -->
  <rect x="60" y="54" width="128" height="56" rx="14" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.16)"/>
  <text x="124" y="92" text-anchor="middle" font-size="28" font-weight="800" letter-spacing="2" fill="#fff">NOVA</text>
  <g>
    <rect x="706" y="54" width="134" height="56" rx="28" fill="#7c5cff"/>
    <text x="773" y="92" text-anchor="middle" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="30" font-weight="800" fill="#0c0e16">ХИТ</text>
  </g>

  <!-- headline -->
  <text x="60" y="232" font-size="78" font-weight="800" fill="#fff" letter-spacing="-1">
    <tspan x="60" dy="0">Робот-</tspan><tspan x="60" dy="86">пылесос</tspan>
  </text>
  <rect x="62" y="344" width="150" height="10" rx="5" fill="#7c5cff"/>
  <text x="62" y="410" font-size="34" font-weight="600" fill="#7c5cff">Уборка, пока вы отдыхаете</text>

  <!-- product -->
  <circle cx="450" cy="630" r="250" fill="url(#glow)"/>
  <g transform="translate(0,58) translate(450,600) scale(0.9) translate(-450,-600)">
      <ellipse cx="450" cy="780" rx="180" ry="40" fill="rgba(0,0,0,.25)"/>
      <circle cx="450" cy="600" r="172" fill="url(#prod)" filter="url(#ds)"/>
      <circle cx="450" cy="600" r="172" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
      <circle cx="450" cy="600" r="120" fill="rgba(255,255,255,.08)"/>
      <circle cx="450" cy="540" r="34" fill="url(#prodA)"/>
      <circle cx="450" cy="540" r="14" fill="rgba(255,255,255,.4)"/>
      <path d="M298 600 a152 152 0 0 1 304 0" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="14"/></g>

  <!-- benefits -->
  <g>
    <rect x="60" y="836" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="878" r="22" fill="#7c5cff"/>
    <path d="M93 878 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="888" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Влажная + сухая уборка</text>
  </g>
  <g>
    <rect x="60" y="926" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="968" r="22" fill="#7c5cff"/>
    <path d="M93 968 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="978" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Строит карту квартиры</text>
  </g>
  <g>
    <rect x="60" y="1016" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="1058" r="22" fill="#7c5cff"/>
    <path d="M93 1058 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="1068" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Тихий режим 55 дБ</text>
  </g>

  <!-- guarantee -->
  <rect x="60" y="1112" width="780" height="62" rx="18" fill="#7c5cff" opacity="0.16"/>
  <rect x="60" y="1112" width="780" height="62" rx="18" fill="none" stroke="#7c5cff" stroke-opacity="0.5"/>
  <circle cx="104" cy="1143" r="16" fill="#7c5cff"/>
  <path d="M95 1143 l6 7 l11 -13" fill="none" stroke="#0c0e16" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="136" y="1153" font-size="27" font-weight="700" fill="#fff">Гарантия 24 месяца</text>
</svg>