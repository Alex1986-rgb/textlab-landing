<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#2a1a0f"/><stop offset="1" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="prod" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd166"/><stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="prodA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <circle cx="760" cy="150" r="280" fill="#fb923c" opacity="0.14"/>
  <circle cx="120" cy="1080" r="240" fill="#ffd166" opacity="0.1"/>

  <!-- brand -->
  <rect x="60" y="54" width="168" height="56" rx="14" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.16)"/>
  <text x="144" y="92" text-anchor="middle" font-size="28" font-weight="800" letter-spacing="2" fill="#fff">STRIDE</text>
  <g>
    <rect x="680" y="54" width="160" height="56" rx="28" fill="#ff5a6e"/>
    <text x="760" y="92" text-anchor="middle" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="30" font-weight="800" fill="#fff">−30%</text>
  </g>

  <!-- headline -->
  <text x="60" y="232" font-size="78" font-weight="800" fill="#fff" letter-spacing="-1">
    <tspan x="60" dy="0">Кроссовки</tspan><tspan x="60" dy="86">беговые</tspan>
  </text>
  <rect x="62" y="344" width="150" height="10" rx="5" fill="#fb923c"/>
  <text x="62" y="410" font-size="34" font-weight="600" fill="#fb923c">Лёгкость на каждом шаге</text>

  <!-- product -->
  <circle cx="450" cy="630" r="250" fill="url(#glow)"/>
  <g transform="translate(0,58) translate(450,600) scale(0.9) translate(-450,-600)">
      <path d="M300 700 q-6 -70 60 -86 q40 -10 64 -44 q26 -38 70 -34 q22 2 26 26 q4 26 34 40 l78 36 q40 18 38 50 q-2 24 -34 24 H332 q-30 0 -32 -22 z" fill="url(#prod)" filter="url(#ds)"/>
      <path d="M296 700 h312 q18 0 18 22 q0 24 -26 24 H300 q-22 0 -22 -24 q0 -22 18 -22 z" fill="url(#prodA)"/>
      <path d="M470 566 q14 18 40 30 l34 16 q-30 8 -54 -6 q-22 -14 -20 -40z" fill="rgba(255,255,255,.18)"/>
      <path d="M392 600 l26 30 M430 580 l26 32" stroke="rgba(255,255,255,.25)" stroke-width="10" stroke-linecap="round" fill="none"/></g>

  <!-- benefits -->
  <g>
    <rect x="60" y="836" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="878" r="22" fill="#fb923c"/>
    <path d="M93 878 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="888" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Вес всего 240 г</text>
  </g>
  <g>
    <rect x="60" y="926" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="968" r="22" fill="#fb923c"/>
    <path d="M93 968 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="978" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Дышащая сетка — нога не потеет</text>
  </g>
  <g>
    <rect x="60" y="1016" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="1058" r="22" fill="#fb923c"/>
    <path d="M93 1058 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="1068" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Амортизация для длинных дистанций</text>
  </g>

  <!-- guarantee -->
  <rect x="60" y="1112" width="780" height="62" rx="18" fill="#fb923c" opacity="0.16"/>
  <rect x="60" y="1112" width="780" height="62" rx="18" fill="none" stroke="#fb923c" stroke-opacity="0.5"/>
  <circle cx="104" cy="1143" r="16" fill="#fb923c"/>
  <path d="M95 1143 l6 7 l11 -13" fill="none" stroke="#0c0e16" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="136" y="1153" font-size="27" font-weight="700" fill="#fff">Обмен размера бесплатно</text>
</svg>