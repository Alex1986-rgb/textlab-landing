<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#2c1d14"/><stop offset="1" stop-color="#1c120b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fda4af" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fda4af" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="prod" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd166"/><stop offset="1" stop-color="#fda4af"/>
    </linearGradient>
    <linearGradient id="prodA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <circle cx="760" cy="150" r="280" fill="#fda4af" opacity="0.14"/>
  <circle cx="120" cy="1080" r="240" fill="#ffd166" opacity="0.1"/>

  <!-- brand -->
  <rect x="60" y="54" width="148" height="56" rx="14" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.16)"/>
  <text x="134" y="92" text-anchor="middle" font-size="28" font-weight="800" letter-spacing="2" fill="#fff">SOFTÉ</text>
  <g>
    <rect x="654" y="54" width="186" height="56" rx="28" fill="#ffd166"/>
    <text x="747" y="92" text-anchor="middle" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="30" font-weight="800" fill="#0c0e16">4.8 ★</text>
  </g>

  <!-- headline -->
  <text x="60" y="232" font-size="78" font-weight="800" fill="#fff" letter-spacing="-1">
    <tspan x="60" dy="0">Крем для рук</tspan><tspan x="60" dy="86">с маслом ши</tspan>
  </text>
  <rect x="62" y="344" width="150" height="10" rx="5" fill="#fda4af"/>
  <text x="62" y="410" font-size="34" font-weight="600" fill="#fda4af">Мягкость с первого применения</text>

  <!-- product -->
  <circle cx="450" cy="630" r="250" fill="url(#glow)"/>
  <g transform="translate(0,58) translate(450,600) scale(0.9) translate(-450,-600)">
      <path d="M384 398 l16 26 h100 l16 -26 z" fill="url(#prodA)"/>
      <rect x="438" y="376" width="24" height="34" rx="6" fill="url(#prodA)"/>
      <path d="M400 424 h100 v300 q0 40 -50 40 q-50 0 -50 -40 z" fill="url(#prod)" filter="url(#ds)"/>
      <rect x="430" y="470" width="40" height="220" rx="20" fill="rgba(255,255,255,.18)"/></g>

  <!-- benefits -->
  <g>
    <rect x="60" y="836" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="878" r="22" fill="#fda4af"/>
    <path d="M93 878 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="888" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Впитывается за 30 секунд</text>
  </g>
  <g>
    <rect x="60" y="926" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="968" r="22" fill="#fda4af"/>
    <path d="M93 968 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="978" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Защита от сухости 24 часа</text>
  </g>
  <g>
    <rect x="60" y="1016" width="780" height="84" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="1058" r="22" fill="#fda4af"/>
    <path d="M93 1058 l8 9 l14 -17" fill="none" stroke="#0c0e16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="1068" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="29" font-weight="700" fill="#fff">Не оставляет липкости</text>
  </g>

  <!-- guarantee -->
  <rect x="60" y="1112" width="780" height="62" rx="18" fill="#fda4af" opacity="0.16"/>
  <rect x="60" y="1112" width="780" height="62" rx="18" fill="none" stroke="#fda4af" stroke-opacity="0.5"/>
  <circle cx="104" cy="1143" r="16" fill="#fda4af"/>
  <path d="M95 1143 l6 7 l11 -13" fill="none" stroke="#0c0e16" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="136" y="1153" font-size="27" font-weight="700" fill="#fff">Натуральный состав 97%</text>
</svg>