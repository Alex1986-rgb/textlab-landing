<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12141f"/>
      <stop offset="1" stop-color="#0c0e16"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.1" r="0.8">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="1050" cy="120" r="240" fill="#22d3ee" opacity="0.12"/>

  <!-- logo -->
  <g transform="translate(80,80)">
    <rect width="64" height="64" rx="18" fill="url(#brand)"/>
    <text x="32" y="46" font-size="36" text-anchor="middle" fill="#fff" font-family="Arial">✦</text>
    <text x="84" y="44" font-size="34" font-weight="800" fill="#eef0f7" font-family="Arial, sans-serif">ТекстЛаб</text>
  </g>

  <!-- headline -->
  <text x="80" y="290" font-size="74" font-weight="800" fill="#eef0f7" font-family="Arial, sans-serif">Тексты, которые</text>
  <text x="80" y="380" font-size="74" font-weight="800" fill="url(#brand)" font-family="Arial, sans-serif">приносят заявки</text>

  <text x="80" y="455" font-size="30" fill="#9aa0b5" font-family="Arial, sans-serif">Копирайтинг-агентство полного цикла · 12 направлений</text>

  <!-- chips -->
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="80" y="500" width="190" height="56" rx="28" fill="rgba(124,92,255,0.15)" stroke="#7c5cff" stroke-opacity="0.4"/>
    <text x="175" y="536" text-anchor="middle" fill="#eef0f7">SEO-тексты</text>
    <rect x="290" y="500" width="170" height="56" rx="28" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-opacity="0.4"/>
    <text x="375" y="536" text-anchor="middle" fill="#eef0f7">Лендинги</text>
    <rect x="480" y="500" width="250" height="56" rx="28" fill="rgba(124,92,255,0.15)" stroke="#7c5cff" stroke-opacity="0.4"/>
    <text x="605" y="536" text-anchor="middle" fill="#eef0f7">Маркетплейсы</text>
  </g>
</svg>
