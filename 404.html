<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0c0e16;color:#eef0f7;overflow:hidden}
.glow{position:fixed;width:500px;height:500px;border-radius:50%;background:#7c5cff;filter:blur(140px);opacity:.35;top:-150px;left:-100px;z-index:0}
.box{position:relative;z-index:1;max-width:480px}
.code{font-size:clamp(80px,18vw,150px);font-weight:800;line-height:1;
  background:linear-gradient(120deg,#7c5cff,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}

p{color:#9aa0b5;margin-bottom:28px;font-size:16px}
a{display:inline-flex;align-items:center;gap:8px;padding:15px 28px;border-radius:14px;font-weight:700;text-decoration:none;
  background:linear-gradient(120deg,#7c5cff,#5a3ff0);color:#fff;box-shadow:0 12px 30px -10px rgba(124,92,255,.7);transition:transform .2s}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="glow"></div>
<div class="box">
  <div class="code">404</div>
  <h1>Страница потерялась в черновиках</h1>
  <p>Такой страницы нет или она переехала. Зато у нас есть тексты, которые приносят заявки.</p>
